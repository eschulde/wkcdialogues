  const el = document.getElementById('subpagearchive');
  el.classList.toggle('show');
}

// Language
function setLang(lang) {
  isZh = (lang === 'zh');
  document.body.classList.remove('lang-en', 'lang-zh');
  document.body.classList.add('lang-' + lang);
  document.querySelector('.lang-toggle a').innerHTML = isZh ? '<strong>English</strong>' : '<strong>中文</strong>';
  document.querySelector('.lang-toggle a').onclick = function() { setLang(isZh ? 'en' : 'zh'); return false; };
  renderPage();
}

// Nav hover (image swap)
function navHover(cat) {
  const catMap = { nature:3, building:4, ideas:5, demographics:6, networks:7, education:8 };
  const num = catMap[cat];
  if (!num) return;
  const btn = document.getElementById('b0' + (cat === 'nature' ? '1' : cat === 'building' ? '2' : cat === 'ideas' ? '3' : cat === 'demographics' ? '4' : cat === 'networks' ? '5' : '6'));
  const caticon = document.getElementById('caticon');
  if (btn) btn.src = 'assets/uploads/categories_over_0' + num + '.png';
  if (caticon) caticon.src = 'assets/uploads/exclamation_' + (cat === 'nature' ? 'nature' : cat === 'building' ? 'building' : cat === 'ideas' ? 'idea' : cat === 'demographics' ? 'demographic' : cat === 'networks' ? 'network' : 'education') + '_01.png';
}
function navNormal() {
  for (let i = 1; i <= 6; i++) {
    const btn = document.getElementById('b0' + i);
    if (btn) btn.src = 'assets/uploads/categories_0' + (i+2) + '.png';
  }
  const caticon = document.getElementById('caticon');
  if (caticon) caticon.src = 'assets/uploads/categories_01.png';
}

// MM_swapImage/Restore (for logo hover)
function MM_swapImage() {
  const args = Array.from(arguments);
  const name = args[0];
  const src = args[args.length - 1].replace('/wp-content/uploads/2010/11/', 'assets/uploads/');
  const img = document.getElementsByName(name)[0] || document.getElementById(name);
  if (img) { img.oSrc = img.src; img.src = src; }
}
function MM_swapImgRestore() {
  document.querySelectorAll('img').forEach(img => { if (img.oSrc) img.src = img.oSrc; });
}

// Render the current page content
function renderPage() {
  const container = document.getElementById('contents_flow');
  
  if (currentPage === 'home') {
    container.innerHTML = renderHome();
  } else if (currentPage === 'overview') {
    container.innerHTML = renderOverview();
  } else if (currentPage === 'participants') {
    container.innerHTML = renderParticipants();
  } else if (currentPage === 'videos') {
    container.innerHTML = renderVideoPage(currentVideoCat);
  } else if (currentPage === 'journal') {
    container.innerHTML = renderJournal();
  } else if (currentPage === 'contribute') {
    container.innerHTML = renderContribute();
  } else if (currentPage === 'about') {
    container.innerHTML = renderAbout();
  } else if (currentPage === 'volunteer') {
    container.innerHTML = renderVolunteer();
  } else if (currentPage === 'acknowledgement') {
    container.innerHTML = renderAcknowledgement();
  } else if (currentPage === 'films' || currentPage === 'photos' || currentPage === 'diagrams') {
    container.innerHTML = renderArchivePlaceholder(currentPage);
  } else {
    container.innerHTML = '<p>Page not found.</p>';
  }
}

function changeVideo(idx, cat) {
  const entries = videos[cat];
  const v = entries[idx];
  const frame = document.getElementById('videoFrame');
  const caption = document.getElementById('caption');
  const t = categoryTitles[cat];
  
  if (v.yt) {
    frame.src = 'https://www.youtube.com/embed/' + v.yt;
  } else {
    frame.src = '';
    frame.outerHTML = '<div id="videoarea" style="width:640px; height:360px; background:#000; color:#fff; display:flex; align-items:center; justify-content:center; font-size:14px;">Video not yet uploaded to YouTube</div>';
  }
  caption.innerHTML = v.person + ' | on <a class="caption" href="#">' + t.cat + '</a>';
}

// Find a participant's video in the videos data by name (fuzzy match)
function findParticipantVideo(name) {
  for (const cat in videos) {
    for (let i = 0; i < videos[cat].length; i++) {
      const v = videos[cat][i];
      // Match if the participant name appears in the video person field
      // Handles cases like "Freeman Lau and Kan Tai Keung" matching either name
      if (v.person === name || v.person.includes(name) || name.includes(v.person)) {
        return { cat: cat, idx: i };
      }
    }
  }
  return null;
}
